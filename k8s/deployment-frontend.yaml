apiVersion: apps/v1
kind: Deployment
metadata:
  name: mi-frontend
  labels:
    app: mi-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mi-frontend
  template:
    metadata:
      labels:
        app: mi-frontend
    spec:
      containers:
      - name: mi-frontend
        image: mi-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        # Inyectar la variable de entorno desde el ConfigMap
        - name: VITE_API_URL
          valueFrom:
            configMapKeyRef:
              name: mi-frontend-config
              key: VITE_API_URL
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
